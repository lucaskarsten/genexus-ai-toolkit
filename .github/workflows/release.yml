name: Release

on:
  push:
    tags:
      - 'gx18-mcp-v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync package version to tag
        working-directory: packages/gx18-mcp
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^gx18-mcp-v', ''
          npm version $version --no-git-tag-version --allow-same-version
          Write-Host "Version set to $version"
      - name: Install & build
        working-directory: packages/gx18-mcp
        run: |
          npm install
          npm rebuild
          npm run build
          npx pkg dist/bin/launcher.js --target node18-win-x64 --output release/GeneXusAIToolkit.exe --icon assets/icon.ico
          node scripts/build-release.js
      - name: Upload release zip
        uses: softprops/action-gh-release@v2
        with:
          files: packages/gx18-mcp/release/GeneXusAIToolkit-windows.zip
