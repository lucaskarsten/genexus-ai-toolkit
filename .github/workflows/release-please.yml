name: Release Please

on:
  push:
    branches:
      - master
  # Manual fallback: release-please@v4 sometimes creates the tag + release but
  # reports release_created != 'true' in the same run, so build-windows is
  # skipped and no .zip is attached. Re-run this workflow with the tag to build
  # and attach the artifact without touching release-please. Example tag:
  # gx18-mcp-v2.1.3
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build & attach the Windows .zip to (e.g. gx18-mcp-v2.1.3)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # On push, run release-please. On manual dispatch this job is skipped and
  # build-windows uses the tag from the dispatch input instead.
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Builds the Windows .exe and attaches it to the release that release-please
  # just created. Kept in the SAME workflow run (not a separate tag-triggered
  # workflow) because tags pushed by the release-please GITHUB_TOKEN do not
  # trigger other workflows — so this job, gated on release_created, is the
  # reliable way to publish the artifact without re-pushing the tag.
  build-windows:
    needs: release-please
    # Run when release-please just created a release (push), OR when manually
    # dispatched with a tag (fallback for the skipped-build bug). always() lets
    # this evaluate even though release-please is skipped on manual dispatch.
    if: |
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: windows-latest
    env:
      # On push: tag from release-please. On dispatch: tag from the input.
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      # On manual dispatch, check out the tag so the build matches the release.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && env.RELEASE_TAG || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync package version to tag
        working-directory: packages/gx18-mcp
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $version = $tag -replace '^gx18-mcp-v', ''
          npm version $version --no-git-tag-version --allow-same-version
          Write-Host "Version set to $version"
      - name: Install & build
        working-directory: packages/gx18-mcp
        run: |
          npm install
          npm rebuild
          npm run build
          npx pkg dist/bin/launcher.js --target node18-win-x64 --output release/GeneXusAIToolkit.exe --icon assets/icon.ico
          node scripts/build-release.js
      - name: Upload release zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: packages/gx18-mcp/release/GeneXusAIToolkit-*-windows.zip
